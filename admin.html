<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <div class="dashboard">

        <!-- Menú lateral -->
        <aside class="sidebar">

            <h2>🍰 Dulce Admin</h2>

            <button id="btnUsuarios">
                👥 Usuarios
            </button>

            <button id="btnProductos">
                🍰 Productos
            </button>

            <button id="btnPedidos">
                📦 Pedidos
            </button>

            <button id="btnCerrarSesion">
                🚪 Cerrar Sesión
            </button>

        </aside>

        <!-- Contenido -->
        <main class="contenido">

<!--TARJETAS-->

<div class="dashboard-cards">

    <div class="card-dashboard">

        <div class="icono">👥</div>

        <div>

            <h4>Usuarios</h4>

            <span id="totalUsuarios">0</span>

        </div>

    </div>

    <div class="card-dashboard">

        <div class="icono">🍰</div>

        <div>

            <h4>Productos</h4>

            <span id="totalProductos">0</span>

        </div>

    </div>

    <div class="card-dashboard">

        <div class="icono">📦</div>

        <div>

            <h4>Pedidos</h4>

            <span id="totalPedidos">0</span>

        </div>

    </div>

    <div class="card-dashboard">

        <div class="icono">💰</div>

        <div>

            <h4>Ventas Hoy</h4>

            <span id="ventasHoy">S/ 0</span>

        </div>

    </div>

</div>


            

            <section id="vistaUsuarios">

                <h2>Usuarios Registrados</h2>

                <div id="contenedorUsuarios"></div>

            </section>

            <section id="vistaProductos" style="display:none;">

    <h2>Productos</h2>

    <div class="formulario-producto">

    <input type="text" id="nombreProducto" placeholder="Nombre del producto">

    <input type="number" id="precioProducto" placeholder="Precio">

    <input type="number" id="stockProducto" placeholder="Stock">

    <input type="date" id="fechaProducto" placeholder="Fecha">

    <input type="text" id="imagenProducto" placeholder="URL de imagen del producto">

    <button id="btnGuardarProducto">
        Guardar Producto
    </button>

</div>

    <hr>

    <div id="contenedorProductos"></div>

</section>

<section id="vistaPedidos" style="display:none;">

    <h2>📦 Pedidos</h2>

    <input
        type="text"
        id="buscarPedido"
        placeholder="Buscar por cliente, correo o producto..."
        class="input-busqueda">

    <div id="contenedorPedidos"></div>

</section>

        </main>

    </div>

    <script type="module" src="js/admin.js"></script>

<div id="modalEditar" class="modal">

    <div class="modal-contenido">

        <span id="cerrarModal">&times;</span>

        <h2>Editar Producto</h2>

        <input
            type="text"
            id="editNombre"
            placeholder="Nombre">

        <input
            type="number"
            id="editPrecio"
            placeholder="Precio">

        <input
            type="number"
            id="editStock"
            placeholder="Stock">

        <input
            type="date"
            id="editFecha"
            placeholder="Fecha">

        <input
            type="text"
            id="editImagen"
            placeholder="URL Imagen">

        <button id="btnActualizarProducto">
            Guardar Cambios
        </button>

    </div>

</div>    

</body>

</html>
