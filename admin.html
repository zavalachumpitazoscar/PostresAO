<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <div class="dashboard">

        <!-- Menú lateral -->
        <aside class="sidebar">

            <h2>🍰 Dulce Admin</h2>

            <button id="btnUsuarios">
                👥 Usuarios
            </button>

            <button id="btnProductos">
                🍰 Productos
            </button>

            <button id="btnPedidos">
                📦 Pedidos
            </button>

            <button id="btnCerrarSesion">
                🚪 Cerrar Sesión
            </button>

        </aside>

        <!-- Contenido -->
        <main class="contenido">

            <section id="vistaUsuarios">

                <h2>Usuarios Registrados</h2>

                <div id="contenedorUsuarios"></div>

            </section>

            <section id="vistaProductos" style="display:none;">

    <h2>Productos</h2>

    <div class="formulario-producto">

    <input type="text" id="nombreProducto" placeholder="Nombre del producto">

    <input type="number" id="precioProducto" placeholder="Precio">

    <input type="number" id="stockProducto" placeholder="Stock">

    <input type="file" id="imagenProducto" accept="image/*">

    <button id="btnGuardarProducto">
        Guardar Producto
    </button>

</div>

    <hr>

    <div id="contenedorProductos"></div>

</section>

            <section id="vistaPedidos" style="display:none;">

                <h2>Pedidos</h2>

                <div id="contenedorPedidos"></div>

            </section>

        </main>

    </div>

    <script type="module" src="js/admin.js"></script>

</body>

</html>
