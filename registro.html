<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Registro</title>

    <link rel="stylesheet"
          href="css/registro.css">

</head>

<body>

    <div class="contenedor">

        <h1>Crear Cuenta</h1>

        <input
            type="text"
            id="nombre"
            placeholder="Nombres y Apellidos">

        <input
            type="email"
            id="correo"
            placeholder="Correo">

        <input
            type="password"
            id="password"
            placeholder="Contraseña">

        <button id="btnRegistrar">
            Registrarse
        </button>

        <p>
            <a href="index.html">
                Volver al Login
            </a>
        </p>

    </div>

    <script
        type="module"
        src="js/registro.js">
    </script>

</body>

</html>
