<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Postres</title>

    <link rel="stylesheet" href="css/cliente.css">
    <link rel="stylesheet" href="css/clienteSplash.css">

</head>

<body>

<div id="splashScreen" class="splash">

    <div class="escena">

        <img src="img/loading/bowl.png" class="bowl">

        <img src="img/loading/harina.png" class="ingrediente harina">

        <img src="img/loading/huevo.png" class="ingrediente huevo">

        <img src="img/loading/leche.png" class="ingrediente leche">

        <img src="img/loading/mantequilla.png" class="ingrediente mantequilla">

        <img src="img/loading/chocolate.png" class="ingrediente chocolate">

        <img src="img/loading/batidor.png" class="batidor">

        <img src="img/loading/cupcake.png" class="cupcake">

        <img src="img/loading/cereza.png" class="cereza">

    </div>

    <h2>Dulce Shop</h2>

    <p>Preparando los mejores postres...</p>

</div>

    <div id="overlay" class="overlay"></div>

    <div class="dashboard">

        <aside class="sidebar">

            <h2>🍰 Dulce Shop</h2>

            <button id="btnCatalogo">
                🍰 Catálogo
            </button>

            <button id="btnMisPedidos">
                📦 Mis Pedidos
            </button>

            <button id="btnCerrarSesion">
                🚪 Cerrar Sesión
            </button>

<div class="sidebar-contacto">

    <h4>📞 Datos de contacto</h4>

    <p>999 999 999</p>

    <p>Pago por QR</p>

    <img
        src="img/qr-pago.png"
        alt="QR de Pago"
        class="qr-sidebar">

    <p class="texto-qr">
        Escanea para pagar con Yape o Plin
    </p>

</div>



        </aside>

<main class="contenido">

<button id="btnMenu" class="btn-menu">
    ☰
</button>

<section id="vistaCatalogo">
<h2>Productos Disponibles</h2>
<input
    type="text"
    id="buscarProducto"
    placeholder="Buscar producto..."
    class="buscador">
                
<div id="contenedorProductos"></div>
</section>



    

<section id="vistaPedidos" style="display:none;">
<h2>Mis Pedidos</h2>
<div id="contenedorMisPedidos"></div>
</section>

</main>

</div>   



    
<!-- BOTÓN FLOTANTE CARRITO -->
<div id="carritoFloatBtn">
    🛒 <span id="carritoCount">0</span>
</div>

<!-- PANEL LATERAL CARRITO -->    
<div id="carritoPanel" class="carrito-panel">

    <div class="carrito-header">
        <h3>🛒 Carrito</h3>
        <button id="cerrarCarrito">✖</button>
    </div>

    <div id="contenedorCarrito" class="carrito-body"></div>

<div class="carrito-footer">

    <h3 id="totalPedido">
        Total: S/ 0
    </h3>

    <div class="metodo-pago">

    <label>
        Método de pago
    </label>

    <select id="metodoPago">
        <option value="">Seleccione...</option>
        <option value="QR">QR / Yape</option>
        <option value="CREDITO_FIN_MES">Crédito fin de mes</option>
    </select>

</div>

<div id="bloqueComprobante" style="display:none;">

    <label>Captura del pago</label>

    <input
        type="file"
        id="comprobantePago"
        accept="image/*"
        hidden>

    <label
        for="comprobantePago"
        class="btn-subir">

        📷 Seleccionar comprobante

    </label>

    <p id="nombreArchivo" class="nombre-archivo">
        Ningún archivo seleccionado
    </p>

</div>

    <button id="btnSolicitarPedido" class="btn-confirm">
        Solicitar pedido
    </button>

</div>

</div>


<script type="module" src="js/cliente.js"></script>

</body>

</html>
